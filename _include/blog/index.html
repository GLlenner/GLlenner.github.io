<ul class="blog-list">
  {% for post in site.posts %}
    <li class="blog-item">
      <a href="{{ post.url | relative_url }}">
        <h3>{{ post.title }}</h3>
        <p>{{ post.excerpt | strip_html | truncate: 120 }}</p>
        <small>{{ post.date | date: "%Y-%m-%d" }}</small>
      </a>
    </li>
  {% endfor %}
</ul>
