<ul class="blog-list">
  {% for post in site.posts %}
    <li class="blog-item">
      <a href="{{ post.url | relative_url }}">
        <div class="blog-text">
          <h3>{{ post.title }}</h3>
          <p>{{ post.excerpt | strip_html | truncate: 100 }}</p>
        </div>
        <div class="blog-date">
          {{ post.date | date: "%Y-%m-%d" }}
        </div>
      </a>
    </li>
  {% endfor %}
</ul>
