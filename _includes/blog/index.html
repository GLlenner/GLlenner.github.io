<ul class="blog-list">
  {% for post in site.posts %}
    <li class="blog-item">
      <a href="{{ post.url | relative_url }}">
        <h3 class="blog-title">{{ post.title }}</h3>
        <p class="blog-excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
        <small class="blog-date">{{ post.date | date: "%Y-%m-%d" }}</small>
      </a>
    </li>
  {% endfor %}
</ul>
